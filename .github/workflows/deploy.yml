name: Deploy TheForgeControlPanel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

# Required repo configuration:
#   Secret:   AZURE_STATIC_WEB_APPS_API_TOKEN  (from `az staticwebapp secrets list`)
#   Variable: AAD_TENANT_ID                    (your Entra tenant ID; not sensitive)
#
# The Forge API key, allowlist, AAD client secret, and game slugs all live in
# Azure Key Vault and are read at runtime by the Function App's managed
# identity. They never appear in this workflow, in GitHub, or in build logs.

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_deploy:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail fast if required config is missing
        env:
          AAD_TENANT_ID: ${{ vars.AAD_TENANT_ID }}
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          missing=0
          if [ -z "$AAD_TENANT_ID" ]; then
            echo "::error::Repo variable AAD_TENANT_ID is not set. Settings → Secrets and variables → Actions → Variables."
            missing=1
          fi
          if [ -z "$SWA_TOKEN" ]; then
            echo "::error::Repo secret AZURE_STATIC_WEB_APPS_API_TOKEN is not set."
            missing=1
          fi
          if [ "$missing" = "1" ]; then exit 1; fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            api/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          AAD_TENANT_ID: ${{ vars.AAD_TENANT_ID }}
        run: npm run build

      - name: Install API deps
        working-directory: api
        run: npm ci --omit=dev

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend'
          output_location: 'dist'
          api_location: 'api'
          skip_app_build: true
          skip_api_build: true

      - name: Smoke check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # SWA deployments take a few seconds to propagate to the edge after
          # the action reports success. Poll the root URL up to 12 times.
          url="${{ steps.deploy.outputs.static_web_app_url }}"
          if [ -z "$url" ]; then
            echo "::warning::No deploy URL returned; skipping smoke check"
            exit 0
          fi
          echo "Probing $url"
          for i in $(seq 1 12); do
            # Expect 302 (redirect to /.auth/login/aad) — proves the auth gate is live
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-redirs 0 "$url" || echo "000")
            echo "  attempt $i: HTTP $code"
            if [ "$code" = "302" ] || [ "$code" = "401" ]; then
              echo "Auth gate is responding correctly."
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Smoke check did not see the auth gate response within 60s. Deployment may still be propagating."

  close_pr_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview
    steps:
      - name: Close
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
